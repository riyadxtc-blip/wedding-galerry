<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>

body{font-family:Arial;margin:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:12px;
}

img{
width:220px;
height:160px;
object-fit:cover;
cursor:pointer;
border:4px solid transparent;
}

.selected{
border:4px solid red;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
}

</style>
</head>

<body>

<h2>Preview Gallery</h2>

<div class="grid" id="gallery"></div>

<button onclick="send()">Kirim Pilihan</button>

<script>

const params=new URLSearchParams(location.search)
const id=params.get("id")

let selected=[]

async function load(){

let r=await fetch("/api/getClients")
let clients=await r.json()

let client=clients.find(c=>c.id==id)

if(!client) return

let api="/api/getDriveImages?link="+encodeURIComponent(client.drive)

let res=await fetch(api)

let images=await res.json()

let html=""

images.forEach(f=>{

html+=`<img src="${f.thumb}" onclick="toggle(this,'${f.name}','${f.link}')">`

})

document.getElementById("gallery").innerHTML=html

}

function toggle(el,name,link){

el.classList.toggle("selected")

let i=selected.findIndex(x=>x.name===name)

if(i>-1){

selected.splice(i,1)

}else{

selected.push({name,link})

}

}

function send(){

let text=""

selected.forEach((f,i)=>{

text+=(i+1)+". "+f.name+"\n"+f.link+"\n\n"

})

let wa="https://wa.me/6281928249653?text="+encodeURIComponent(text)

window.open(wa)

}

load()

</script>

</body>
</html>
